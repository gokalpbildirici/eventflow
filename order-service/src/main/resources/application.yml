server:
  port: 8081

spring:
  application:
    name: order-service
  cloud:
    stream:
      function:
        definition: orderCreatedSupplier
      bindings:
        orderCreatedSupplier-out-0:
          destination: order.events
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
