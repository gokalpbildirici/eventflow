server:
  port: 8084

spring:
  application:
    name: notification-service
  cloud:
    stream:
      function:
        definition: orderCreatedNotification;paymentProcessedNotification;stockReservedNotification
      bindings:
        orderCreatedNotification-in-0:
          destination: order.events
          group: notification-service
          content-type: application/json
        paymentProcessedNotification-in-0:
          destination: payment.events
          group: notification-service
          content-type: application/json
        stockReservedNotification-in-0:
          destination: inventory.events
          group: notification-service
          content-type: application/json
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
